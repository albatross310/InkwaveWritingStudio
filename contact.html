<head>
  <meta charset="UTF-8" />

  <link rel="canonical" href="https://inkwave.me/contact" />
  <link rel="alternate" hreflang="en-AU" href="https://inkwave.me/contact" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://inkwave.me/contact" />
  <meta property="og:title" content="Contact | Inkwave Writing Studio" />
  <meta property="og:description" content="Questions, feedback, and research inquiries welcome." />
  <meta property="og:image" content="https://inkwave.me/og-image.png" />
  <meta property="og:site_name" content="Inkwave Writing Studio" />

  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="stylesheet" href="/style.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "name": "Contact Inkwave Writing Studio",
    "url": "https://inkwave.me/contact",
    "publisher": {
      "@type": "Organization",
      "name": "Inkwave Writing Studio",
      "url": "https://inkwave.me",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "general",
        "email": "petergibson127@gmail.com"
      }
    }
  }
  </script>
</head>
<body>

  <a href="#main" class="skip-link">Skip to content</a>

  <nav aria-label="Main navigation">
    <a href="/" class="nav-logo" aria-label="Inkwave Writing Studio home">Inkwave Writing Studio</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/philosophy">Philosophy</a>
      <a href="/contact" class="active" aria-current="page">Contact</a>
    </div>
  </nav>

  <main id="main" class="prose-page contact-page">
    <h1>Contact</h1>
    <div class="page-bar" aria-hidden="true"></div>
    <p class="lead">Questions, feedback, or research inquiries — get in touch.</p>

    <form class="contact-form" action="https://formspree.io/f/mjgqyqrq" method="POST">
      <label>
        Name
        <input type="text" name="name" autocomplete="name" placeholder="Your name" required />
      </label>
      <label>
        Email
        <input type="email" name="email" autocomplete="email" placeholder="your@email.com" required />
      </label>
      <label>
        Message
        <textarea name="message" rows="5" placeholder="What's on your mind?" required></textarea>
      </label>
      <button type="submit" class="cta">Send →</button>
    </form>

    <p class="contact-alt">Or email directly: <a href="mailto:petergibson127@gmail.com">petergibson127@gmail.com</a></p>
  </main>

  <footer>
    <p>Inkwave Writing Studio &middot; <a href="https://iwsolo.com" rel="noopener noreferrer" target="_blank">iwsolo.com</a> &middot; Built in Brisbane, Australia</p>
  </footer>

</body>
</html>
